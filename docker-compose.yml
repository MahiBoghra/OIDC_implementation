

services:
  postgres:
    image: postgres:17

    container_name: postgres_db

    restart: unless-stopped

    environment:
      POSTGRES_USER: mahi
      POSTGRES_PASSWORD: mahi123
      POSTGRES_DB: auth_db

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: